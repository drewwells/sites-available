server {
    server_name swingelo.com www.swingelo.com;

    location / {
        include sites-available/snippets/upstreams/common.conf;
        set $upstream http://$upstream_host:7074;
        include sites-available/snippets/jayloves-proxy.conf;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/swingelo.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/swingelo.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = swingelo.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    if ($host = www.swingelo.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name swingelo.com www.swingelo.com;
}
# NOTE: Before first deploy, run:
#   bash regen-certs-swingelo.sh
# The cert at /etc/letsencrypt/live/swingelo.com/ must exist before nginx can load the SSL block above.
